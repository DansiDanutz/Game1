name: ✨ Feature request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What's the idea?
      description: What problem does it solve, or what would it add?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: How might it work?
      description: Sketch the UX or behavior. Keep in mind the project is dependency-free.
  - type: checkboxes
    id: scope
    attributes:
      label: Area
      options:
        - label: Gameplay / levels
        - label: Multiplayer / battle
        - label: Personalization / themes
        - label: Cloud / leaderboards
        - label: Performance / accessibility
